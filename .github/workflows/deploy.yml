name: Atualizar feed e publicar

on:
  push:
    branches: [main]
  schedule:
    # Todo dia às 06:00 UTC (03:00 horário de Brasília) — antes era só
    # segunda-feira, mas o catálogo de livros da Amazon (PA-API) precisa
    # atualizar no máximo a cada 24h por exigência do próprio termo de uso
    # da Amazon Associates. Como o deploy sempre republica o dist/ inteiro,
    # Awin e Grupo Boticário passam a ser rebuscados junto, todo dia também
    # (efeito colateral aceito — sem custo conhecido até agora).
    - cron: '0 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Baixar feed e gerar JSON + build
        env:
          AWIN_API_KEY: ${{ secrets.AWIN_API_KEY }}
          OUIPARIS_USER_ID: ${{ secrets.OUIPARIS_USER_ID }}
          AMAZON_ACCESS_KEY: ${{ secrets.AMAZON_ACCESS_KEY }}
          AMAZON_SECRET_KEY: ${{ secrets.AMAZON_SECRET_KEY }}
          AMAZON_PARTNER_TAG: ${{ secrets.AMAZON_PARTNER_TAG }}
          # Domínio próprio (CNAME) serve a partir da raiz, não de /repo-name/.
          VITE_BASE_PATH: /
          SITE_URL: https://comprar.blendibox.com.br
        run: npm run build

      - name: Commitar histórico de preços atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/price-history.json
          git diff --cached --quiet || git commit -m "chore: atualiza histórico de preços [skip ci]"
          git push

      - name: Upload do artefato do Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
