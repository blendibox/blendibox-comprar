name = "blendibox-newsletter"
main = "newsletter-worker.js"
compatibility_date = "2026-01-01"

# TESTE TEMPORÁRIO: roda uma vez só, terça 14/07 às 8h UTC (5h Brasília),
# pra confirmar que o cron da Cloudflare dispara sozinho sem intervenção
# manual. Depois de confirmado, reverter pra "0 8 * * 1" (toda segunda).
[triggers]
crons = ["0 8 14 7 *"]

# Configuração normal (produção), 2h depois do workflow semanal do site
# (deploy.yml, 6h UTC) — tempo suficiente pro digest.json mais recente já
# estar publicado no GitHub Pages antes do Worker buscar:
#   crons = ["0 8 * * 1"]

[vars]
ALLOWED_ORIGIN = "https://comprar.blendibox.com.br"
SITE_URL = "https://comprar.blendibox.com.br"
RESEND_SEGMENT_ID = "0236b828-d608-4a80-8216-f2d8d224969b"
DIGEST_FROM_EMAIL = "Compare Ofertas <ofertas@blendibox.com.br>"

# RESEND_API_KEY e RESEND_AUDIENCE_ID são secrets — configure com:
#   wrangler secret put RESEND_API_KEY
#   wrangler secret put RESEND_AUDIENCE_ID
