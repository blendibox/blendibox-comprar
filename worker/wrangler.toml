name = "blendibox-newsletter"
main = "newsletter-worker.js"
compatibility_date = "2026-01-01"

# Toda segunda-feira às 8h UTC (5h Brasília) — 2h depois do primeiro
# workflow do site do dia (deploy.yml roda todo dia às 6h UTC desde a
# integração com a Amazon/Shopee), tempo suficiente pro digest.json mais
# recente já estar publicado no GitHub Pages antes do Worker buscar.
#
# O teste pontual de 14/07 (data fixa "0 8 14 7 *", só disparava uma vez)
# nunca foi revertido pra essa expressão recorrente — motivo pelo qual o
# broadcast parou de sair depois daquele disparo único. Corrigido em
# 2026-07-22.
[triggers]
crons = ["0 8 * * 1"]

[vars]
ALLOWED_ORIGIN = "https://comprar.blendibox.com.br"
SITE_URL = "https://comprar.blendibox.com.br"
RESEND_SEGMENT_ID = "0236b828-d608-4a80-8216-f2d8d224969b"
DIGEST_FROM_EMAIL = "Compare Ofertas <ofertas@blendibox.com.br>"

# RESEND_API_KEY e RESEND_AUDIENCE_ID são secrets — configure com:
#   wrangler secret put RESEND_API_KEY
#   wrangler secret put RESEND_AUDIENCE_ID
